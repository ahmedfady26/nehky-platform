version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: nehky-postgres
    environment:
      POSTGRES_DB: nehky_db
      POSTGRES_USER: nehky_user
      POSTGRES_PASSWORD: nehky_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - nehky-network

  redis:
    image: redis:7-alpine
    container_name: nehky-redis
    ports:
      - "6379:6379"
    networks:
      - nehky-network

volumes:
  postgres_data:

networks:
  nehky-network:
    driver: bridge
